name: Update Match Scores

on:
  schedule:
    # 19:15-06:15 UTC = 22:15-09:15 UTC+3, covers all match windows
    - cron: '23 22-23,0-9 * * *'
      timezone: Europe/Bucharest
  workflow_dispatch: # lets you trigger it manually from the GitHub Actions UI

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update-scores:
    runs-on: ubuntu-latest

    permissions:
      contents: write # needed to push commits back to the repo

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main
        run: |
          git pull --ff-only origin main

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch and update scores
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/update-scores.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated scores
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update match scores [skip ci]"
          git push
