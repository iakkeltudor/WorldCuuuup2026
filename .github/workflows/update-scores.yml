name: Update Match Scores

on:
  schedule:
    # Runs every 1 hour — adjust if you want more or less frequent updates
    - cron: '0 */1 * * *'
  workflow_dispatch:  # lets you trigger it manually from the GitHub Actions UI

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push commits back to the repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update scores
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node scripts/update-scores.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated scores
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: update match scores [skip ci]"
          git push
